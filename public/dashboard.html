<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | KYC Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        glass: 'rgba(255, 255, 255, 0.05)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <!-- Background elements -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-lg">
        <div id="status-card" class="glass-card p-8 shadow-2xl text-center">
            <div id="loader" class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400">Loading your status...</p>
            </div>

            <div id="status-content" class="hidden">
                <div id="status-icon" class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl"></div>
                <h2 id="status-title" class="text-2xl font-bold mb-2"></h2>
                <p id="status-desc" class="text-slate-400 mb-8"></p>
                
                <div id="action-container"></div>

                <button id="logout-btn" class="mt-8 text-slate-500 hover:text-white transition-colors text-sm underline">Logout</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, apiCall, logout } from '/src/js/api.js';

        async function init() {
            if (!auth.currentUser) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const data = await apiCall('/api/users');
                if (!data) {
                    window.location.href = 'index.html';
                    return;
                }
                
                let rentalData = null;
                if (data.status === 'approved') {
                    try {
                        rentalData = await apiCall('/api/rentals');
                    } catch (e) {
                        console.warn("No rental record found yet.");
                    }
                }
                
                renderStatus(data, rentalData);
            } catch (error) {
                console.error("Error loading status", error);
                window.location.href = 'index.html';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            logout();
            window.location.href = 'index.html';
        });

        function renderStatus(userData, rentalData) {
            const loader = document.getElementById('loader');
            const content = document.getElementById('status-content');
            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');
            const actionContainer = document.getElementById('action-container');

            loader.classList.add('hidden');
            content.classList.remove('hidden');

            if (userData.status === 'pending') {
                icon.innerHTML = '⏳';
                icon.classList.add('bg-yellow-500/20', 'text-yellow-500');
                title.innerText = "Verification Pending";
                desc.innerText = "Our team is reviewing your documents. This usually takes 2-4 hours.";
            } else if (userData.status === 'rejected') {
                icon.innerHTML = '❌';
                icon.classList.add('bg-red-500/20', 'text-red-500');
                title.innerText = "Verification Rejected";
                desc.innerText = "Unfortunately, your verification was rejected. Reason: " + (userData.reason || "Invalid documents.");
                actionContainer.innerHTML = `<button onclick="window.location.href='index.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-all">Try Again</button>`;
            } else if (userData.status === 'approved') {
                if (rentalData && rentalData.paymentStatus === 'paid') {
                    icon.innerHTML = '✅';
                    icon.classList.add('bg-green-500/20', 'text-green-500');
                    title.innerText = "Access Granted";
                    desc.innerText = "Your account is verified and payment is confirmed. Welcome!";
                    
                    // Show Rental Details
                    actionContainer.innerHTML = `
                        <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-left space-y-2 mb-6">
                            <div class="flex justify-between text-xs"><span class="text-slate-500">Vehicle</span><span class="font-medium">${rentalData.vehicleModel} (${rentalData.vehicleNo})</span></div>
                            <div class="flex justify-between text-xs"><span class="text-slate-500">Rent Period</span><span class="font-medium">${rentalData.rentDate} to ${rentalData.returnDate}</span></div>
                        </div>
                        <button onclick="window.location.href='payment.html'" class="w-full bg-slate-700 text-slate-300 font-semibold py-2 rounded-lg transition-all">View Receipt</button>
                    `;
                } else if (rentalData) {
                    icon.innerHTML = '🎉';
                    icon.classList.add('bg-blue-500/20', 'text-blue-500');
                    title.innerText = "Approved!";
                    desc.innerText = "Your KYC is approved. Please review your rental details and proceed to payment.";
                    
                    // Show Rental Details and Payment Button
                    actionContainer.innerHTML = `
                        <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-left space-y-2 mb-6">
                            <div class="flex justify-between text-xs"><span class="text-slate-500">Vehicle</span><span class="font-medium">${rentalData.vehicleModel} (${rentalData.vehicleNo})</span></div>
                            <div class="flex justify-between text-xs"><span class="text-slate-500">Rent Amount</span><span class="font-medium">₹${rentalData.rent}</span></div>
                            <div class="flex justify-between text-xs"><span class="text-slate-500">Security Deposit</span><span class="font-medium">₹${rentalData.security}</span></div>
                            <div class="border-t border-white/10 pt-2 flex justify-between font-bold text-blue-400"><span>Total Due</span><span>₹${rentalData.totalAmount}</span></div>
                        </div>
                        <button onclick="window.location.href='payment.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all shadow-lg">Proceed to Payment</button>
                    `;
                } else {
                    icon.innerHTML = '🎉';
                    icon.classList.add('bg-blue-500/20', 'text-blue-500');
                    title.innerText = "KYC Approved!";
                    desc.innerText = "Wait a moment while the admin assigns a vehicle for you.";
                }
            }
        }

        init();
    </script>
</body>
</html>
