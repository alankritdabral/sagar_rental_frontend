<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Fleet | Rental Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        glass: 'rgba(255, 255, 255, 0.05)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/styles.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        /* Custom scrollbar for table */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">
    <!-- Navbar -->
    <nav class="w-full max-w-6xl flex justify-between items-center mb-10 px-4">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">R</div>
            <span class="font-bold text-xl tracking-tight hidden sm:inline">Rental Portal</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/" class="text-sm text-slate-400 hover:text-white transition-colors">Home</a>
            <div id="user-nav-info" class="hidden flex items-center gap-3">
                <span id="nav-user-phone" class="text-xs text-slate-400"></span>
                <button id="nav-logout" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-lg border border-white/10 transition-all">Logout</button>
            </div>
            <a href="/admin/admin-login.html" id="admin-login-link" class="text-xs font-semibold text-blue-400 hover:text-blue-300 transition-all flex items-center gap-1">
                <span>Admin Access</span>
            </a>
        </div>
    </nav>

    <!-- Background elements -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-6xl">
        <div class="mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Our Fleet</h1>
            <p class="text-slate-400 text-sm">Manage and search through our vehicle inventory.</p>
        </div>

        <!-- Search and Filters -->
        <div class="glass-card p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="space-y-1 lg:col-span-2">
                    <label class="text-[10px] uppercase tracking-wider text-slate-500 font-bold px-1">Search Vehicle</label>
                    <input type="text" id="search-query" placeholder="Search by name or plate number..." class="bg-slate-800 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-wider text-slate-500 font-bold px-1">Sort By</label>
                    <select id="sort-by" class="bg-slate-800 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full cursor-pointer">
                        <option value="none">Default (Recent)</option>
                        <option value="insurance">Insurance Expiry (Closest)</option>
                        <option value="pollution">Pollution Expiry (Closest)</option>
                        <option value="service">Farthest Service Done</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="reset-filters" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-slate-300 py-2.5 rounded-lg transition-all">Reset All Filters</button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="glass-card overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10">
                            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Vehicle Info</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">RC Number</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Expiries & Maintenance</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Status</th>
                        </tr>
                    </thead>
                    <tbody id="car-list" class="divide-y divide-white/5">
                        <!-- Car rows will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="no-results" class="hidden py-20 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-slate-400">No vehicles found matching your criteria.</p>
            </div>
        </div>
    </div>

    <!-- App Scripts -->
    <script type="module">
        const today = new Date();
        const getFutureDate = (days) => {
            const d = new Date();
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        };

        const dummyCars = [
            {
                id: 1,
                name: "Toyota Fortuner",
                plate: "KA 01 MG 1234",
                rc: "RC-KA01-7829102",
                pollution: getFutureDate(3), // Red
                insurance: getFutureDate(20), // Green
                service: "2024-05-10",
                status: "Available"
            },
            {
                id: 2,
                name: "Hyundai Creta",
                plate: "KA 05 NH 5566",
                rc: "RC-KA05-1122334",
                pollution: getFutureDate(12), // Yellow
                insurance: getFutureDate(4), // Red
                service: "2024-03-22",
                status: "Rented"
            },
            {
                id: 3,
                name: "Mahindra Thar",
                plate: "KA 03 PL 9988",
                rc: "RC-KA03-8877665",
                pollution: getFutureDate(40), // Green
                insurance: getFutureDate(60), // Green
                service: "2024-05-20",
                status: "Available"
            },
            {
                id: 4,
                name: "Maruti Swift",
                plate: "KA 51 MJ 4433",
                rc: "RC-KA51-0099887",
                pollution: getFutureDate(8), // Yellow
                insurance: getFutureDate(14), // Yellow
                service: "2024-01-30",
                status: "In Service"
            },
            {
                id: 5,
                name: "Honda City",
                plate: "KA 02 RS 7722",
                rc: "RC-KA02-4455667",
                pollution: getFutureDate(100), // Green
                insurance: getFutureDate(5), // Red
                service: "2024-05-25",
                status: "Available"
            }
        ];

        const carListElement = document.getElementById('car-list');
        const noResultsElement = document.getElementById('no-results');
        
        // Search inputs
        const searchQuery = document.getElementById('search-query');
        const sortBy = document.getElementById('sort-by');
        const resetBtn = document.getElementById('reset-filters');

        const formatDate = (dateStr) => {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        const getExpiryStyle = (dateStr) => {
            const expDate = new Date(dateStr);
            const diffTime = expDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays <= 5) return 'text-red-400 bg-red-400/10 border-red-400/20';
            if (diffDays <= 15) return 'text-yellow-400 bg-yellow-400/10 border-yellow-400/20';
            return 'text-green-400 bg-green-400/10 border-green-400/20';
        };

        const getStatusColor = (status) => {
            switch(status) {
                case 'Available': return 'text-green-400 bg-green-400/10 border-green-400/20';
                case 'Rented': return 'text-blue-400 bg-blue-400/10 border-blue-400/20';
                case 'In Service': return 'text-yellow-400 bg-yellow-400/10 border-yellow-400/20';
                default: return 'text-slate-400 bg-slate-400/10 border-slate-400/20';
            }
        };

        const renderCars = (cars) => {
            carListElement.innerHTML = '';
            
            if (cars.length === 0) {
                noResultsElement.classList.remove('hidden');
                return;
            }
            
            noResultsElement.classList.add('hidden');
            
            cars.forEach(car => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors group";
                tr.innerHTML = `
                    <td class="px-6 py-6">
                        <div class="font-bold text-white group-hover:text-blue-400 transition-colors text-lg">${car.name}</div>
                        <div class="text-sm text-slate-500 font-mono mt-1">${car.plate}</div>
                    </td>
                    <td class="px-6 py-6 text-sm text-slate-300 font-mono italic">${car.rc}</td>
                    <td class="px-6 py-6 space-y-3">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] w-28 uppercase text-slate-500 font-bold">Pollution Expiry:</span>
                            <span class="px-2.5 py-1 rounded text-xs font-semibold border ${getExpiryStyle(car.pollution)}">${formatDate(car.pollution)}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] w-28 uppercase text-slate-500 font-bold">Insurance Expiry:</span>
                            <span class="px-2.5 py-1 rounded text-xs font-semibold border ${getExpiryStyle(car.insurance)}">${formatDate(car.insurance)}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] w-28 uppercase text-slate-500 font-bold">Service Date:</span>
                            <span class="text-xs text-slate-300 font-medium">${formatDate(car.service)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-6">
                        <span class="px-3 py-1.5 rounded-full text-[10px] font-bold border ${getStatusColor(car.status)}">
                            ${car.status.toUpperCase()}
                        </span>
                    </td>
                `;
                carListElement.appendChild(tr);
            });
        };

        const filterAndSortCars = () => {
            const query = searchQuery.value.toLowerCase();
            const sort = sortBy.value;

            let filtered = dummyCars.filter(car => {
                const matchesName = car.name.toLowerCase().includes(query);
                const matchesPlate = car.plate.toLowerCase().includes(query);
                return matchesName || matchesPlate;
            });

            if (sort === 'insurance') {
                filtered.sort((a, b) => new Date(a.insurance) - new Date(b.insurance));
            } else if (sort === 'pollution') {
                filtered.sort((a, b) => new Date(a.pollution) - new Date(b.pollution));
            } else if (sort === 'service') {
                // Farthest service done = Oldest date first
                filtered.sort((a, b) => new Date(a.service) - new Date(b.service));
            }

            renderCars(filtered);
        };

        // Event listeners
        searchQuery.addEventListener('input', filterAndSortCars);
        sortBy.addEventListener('change', filterAndSortCars);

        resetBtn.addEventListener('click', () => {
            searchQuery.value = '';
            sortBy.value = 'none';
            renderCars(dummyCars);
        });

        // Initial render
        renderCars(dummyCars);

        // Simple auth-check (like dashboard)
        import { auth, logout } from '/src/js/api.js';
        
        const updateNav = () => {
            const userNav = document.getElementById('user-nav-info');
            const adminLink = document.getElementById('admin-login-link');
            const userPhone = document.getElementById('nav-user-phone');

            if (auth.currentUser) {
                userNav.classList.remove('hidden');
                userPhone.innerText = auth.currentUser.phone;
                if (auth.currentUser.role === 'admin') {
                    adminLink.href = "/admin/admin.html";
                    adminLink.innerHTML = '<span>Dashboard</span>';
                }
            } else {
                userNav.classList.add('hidden');
            }
        };

        document.getElementById('nav-logout').onclick = () => {
            logout();
            window.location.reload();
        };

        window.addEventListener('auth-changed', updateNav);
        updateNav();
    </script>
</body>
</html>
